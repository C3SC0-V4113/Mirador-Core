services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: mirador-core-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mirador_core
    ports:
      - '5432:5432'
    volumes:
      - mirador-core-postgres:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d mirador_core']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mirador-core-postgres:
