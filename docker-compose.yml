services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ceo_chat_core
    ports:
      - "5432:5432"
    volumes:
      - ceo-chat-core-postgres:/var/lib/postgresql/data

volumes:
  ceo-chat-core-postgres:
