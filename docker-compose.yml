services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mirador_core
    ports:
      - '5432:5432'
    volumes:
      - mirador-core-postgres:/var/lib/postgresql/data

volumes:
  mirador-core-postgres:
